<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #0f172a; min-height: 100vh; }

  header {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 14px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-avatar {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-info h2 { font-size: 15px; font-weight: 700; }
  .header-info span { font-size: 12px; color: #64748b; }

  button { cursor: pointer; border: none; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 500; transition: all 0.2s; }
  .btn-logout { background: #f1f5f9; color: #64748b; padding: 8px 14px; font-size: 12px; border-radius: 8px; }
  .btn-logout:hover { background: #e2e8f0; }
  .btn-primary { background: #3b82f6; color: white; padding: 10px 20px; font-size: 14px; border-radius: 10px; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #f1f5f9; color: #374151; padding: 9px 18px; font-size: 13px; border-radius: 8px; }

  /* Login */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%); }
  .login-box {
    background: white; border-radius: 20px; padding: 44px;
    width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    text-align: center;
  }
  .login-logo { font-size: 52px; margin-bottom: 16px; }
  .login-box h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  .login-box p { font-size: 14px; color: #64748b; margin-bottom: 32px; }

  .form-group { margin-bottom: 14px; text-align: left; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 11px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s; background: #f8fafc;
  }
  .form-group input:focus, .form-group select:focus { border-color: #3b82f6; background: white; }
  .form-group textarea { height: 80px; resize: vertical; }
  .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; text-align: center; }

  /* Main layout */
  .main { display: grid; grid-template-columns: 320px 1fr; gap: 0; min-height: calc(100vh - 65px); }

  /* Sidebar calendario */
  .sidebar {
    background: white;
    border-right: 1px solid #e2e8f0;
    padding: 24px;
    overflow-y: auto;
  }

  .stats-mini { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
  .stat-mini { background: #f8fafc; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-mini .num { font-size: 22px; font-weight: 800; color: #3b82f6; }
  .stat-mini .lbl { font-size: 10px; color: #64748b; margin-top: 2px; font-weight: 500; }

  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cal-header span { font-size: 15px; font-weight: 700; }
  .cal-nav-btn { background: #f1f5f9; border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .cal-nav-btn:hover { background: #e2e8f0; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-day-name { font-size: 10px; color: #94a3b8; font-weight: 600; text-align: center; padding: 6px 0; }
  .cal-day {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    transition: all 0.15s; position: relative;
    font-weight: 500;
  }
  .cal-day:hover:not(.empty) { background: #eff6ff; color: #3b82f6; }
  .cal-day.today { background: #3b82f6; color: white; font-weight: 700; }
  .cal-day.selected:not(.today) { background: #dbeafe; color: #1d4ed8; font-weight: 700; }
  .cal-day.has-cita::after {
    content: '';
    position: absolute;
    bottom: 3px; left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    background: #3b82f6;
    border-radius: 50%;
  }
  .cal-day.today.has-cita::after { background: white; }
  .cal-day.empty { cursor: default; }
  .cal-day.other-month { color: #cbd5e1; }

  .sidebar-divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }

  .upcoming-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  
  .upcoming-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    margin-bottom: 6px; cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .upcoming-item:hover { background: #f8fafc; }
  .upcoming-item.selected { background: #eff6ff; border-color: #bfdbfe; }
  .upcoming-dot { width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; flex-shrink: 0; }
  .upcoming-dot.cancelled { background: #ef4444; }
  .upcoming-dot.completed { background: #22c55e; }
  .upcoming-info { flex: 1; min-width: 0; }
  .upcoming-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upcoming-date { font-size: 11px; color: #94a3b8; margin-top: 1px; }
  .upcoming-time { font-size: 13px; font-weight: 700; color: #3b82f6; flex-shrink: 0; }

  /* Contenido principal */
  .content { padding: 28px; overflow-y: auto; }

  .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .content-header h2 { font-size: 22px; font-weight: 800; }
  .content-header span { font-size: 14px; color: #64748b; margin-top: 2px; display: block; }

  /* Timeline */
  .timeline { position: relative; }

  .time-block { display: flex; gap: 16px; margin-bottom: 8px; }
  .time-label-col { width: 56px; text-align: right; padding-top: 12px; flex-shrink: 0; }
  .time-label-col span { font-size: 12px; color: #94a3b8; font-weight: 500; }

  .time-content { flex: 1; min-height: 52px; border-left: 2px solid #f1f5f9; padding-left: 16px; padding-bottom: 4px; }
  .time-content.has-appointment { border-left-color: #3b82f6; }

  .cita-card {
    background: white;
    border: 1.5px solid #e2e8f0;
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 8px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .cita-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: #3b82f6;
    border-radius: 4px 0 0 4px;
  }
  .cita-card.cancelled::before { background: #ef4444; }
  .cita-card.completed::before { background: #22c55e; }
  .cita-card:hover { border-color: #bfdbfe; box-shadow: 0 4px 16px rgba(59,130,246,0.1); transform: translateY(-1px); }

  .cita-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .cita-nombre { font-size: 15px; font-weight: 700; }
  .cita-hora-badge {
    background: #eff6ff; color: #3b82f6;
    padding: 4px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .cita-cancelled .cita-hora-badge { background: #fee2e2; color: #ef4444; }
  .cita-completed .cita-hora-badge { background: #dcfce7; color: #16a34a; }

  .cita-details { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .cita-detail { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #64748b; }
  .cita-detail strong { color: #374151; }

  .cita-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-confirmed { background: #dbeafe; color: #2563eb; }
  .badge-cancelled { background: #fee2e2; color: #dc2626; }
  .badge-completed { background: #dcfce7; color: #16a34a; }

  .cita-notes { font-size: 12px; color: #94a3b8; margin-top: 6px; font-style: italic; }

  .empty-day {
    text-align: center; padding: 64px 32px;
    background: white; border-radius: 16px;
    border: 2px dashed #e2e8f0;
  }
  .empty-day .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-day h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .empty-day p { font-size: 14px; color: #94a3b8; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 20px; padding: 32px; width: 100%; max-width: 460px; margin: 24px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.12); }
  .modal h3 { font-size: 18px; font-weight: 800; margin-bottom: 24px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid #e2e8f0; }
    .content { padding: 16px; }
  }
</style>
</head>
<body>

<header id="app-header" style="display:none">
  <div class="header-left">
    <div class="header-avatar" id="header-emoji">📅</div>
    <div class="header-info">
      <h2 id="empresa-nombre">Mi Negocio</h2>
      <span id="empresa-tipo"></span>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn-primary" onclick="abrirModal()" style="font-size:13px;padding:8px 16px">+ Nueva cita</button>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
</header>

<!-- LOGIN -->
<div class="login-wrap" id="login-section">
  <div class="login-box">
    <div class="login-logo">📅</div>
    <h2>Mi Agenda</h2>
    <p>Inicia sesión para gestionar tus citas</p>
    <div class="form-group">
      <label>Usuario</label>
      <input type="text" id="login-user" placeholder="tu_usuario">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
    </div>
    <p class="error-msg" id="login-error">Usuario o contraseña incorrectos</p>
    <button class="btn-primary" style="width:100%;margin-top:8px;border-radius:10px;padding:12px" onclick="login()">Entrar</button>
  </div>
</div>

<!-- PANEL -->
<div id="panel-section" style="display:none">
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="stats-mini">
        <div class="stat-mini"><div class="num" id="stat-hoy">0</div><div class="lbl">Hoy</div></div>
        <div class="stat-mini"><div class="num" id="stat-semana">0</div><div class="lbl">Semana</div></div>
        <div class="stat-mini"><div class="num" id="stat-mes">0</div><div class="lbl">Mes</div></div>
      </div>

      <div class="cal-header">
        <button class="cal-nav-btn" onclick="cambiarMes(-1)">‹</button>
        <span id="cal-titulo"></span>
        <button class="cal-nav-btn" onclick="cambiarMes(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>

      <hr class="sidebar-divider">
      <div class="upcoming-title">Próximas citas</div>
      <div id="upcoming-list"></div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="content-header">
        <div>
          <h2 id="dia-titulo">Hoy</h2>
          <span id="dia-subtitulo"></span>
        </div>
      </div>
      <div class="timeline" id="timeline"></div>
    </div>

  </div>
</div>

<!-- Modal nueva cita -->
<div class="modal-overlay" id="modal-cita">
  <div class="modal">
    <h3>Nueva cita</h3>
    <div class="form-group"><label>Nombre del cliente *</label><input type="text" id="cita-nombre" placeholder="Juan García"></div>
    <div class="form-group"><label>Teléfono</label><input type="text" id="cita-telefono" placeholder="+521234567890"></div>
    <div class="form-group"><label>Fecha *</label><input type="date" id="cita-fecha"></div>
    <div class="form-group"><label>Hora</label>
      <select id="cita-hora">
        <option>09:00</option><option>09:30</option><option>10:00</option><option>10:30</option>
        <option>11:00</option><option>11:30</option><option>12:00</option><option>12:30</option>
        <option>15:00</option><option>15:30</option><option>16:00</option><option>16:30</option>
        <option>17:00</option><option>17:30</option>
      </select>
    </div>
    <div class="form-group"><label>Servicio</label><input type="text" id="cita-servicio" placeholder="Consulta general"></div>
    <div class="form-group"><label>Notas</label><textarea id="cita-notas" placeholder="Información adicional..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-primary" onclick="guardarCita()">Guardar cita</button>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin
  let token = localStorage.getItem('client_token')
  let companyData = JSON.parse(localStorage.getItem('client_company') || 'null')
  let todasCitas = []
  let currentMonth = new Date()
  let selectedDate = new Date().toISOString().split('T')[0]

  const EMOJIS = { dentista: '🦷', psicologo: '🧠', estetica: '✂️', veterinaria: '🐾', nutriologo: '🥗' }
  const HORAS = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','15:00','15:30','16:00','16:30','17:00','17:30']

  if (token && companyData) mostrarPanel()

  async function login() {
    const username = document.getElementById('login-user').value
    const password = document.getElementById('login-pass').value
    const res = await fetch(`${API}/auth/client-login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    if (res.ok) {
      const data = await res.json()
      token = data.token
      companyData = data.company
      localStorage.setItem('client_token', token)
      localStorage.setItem('client_company', JSON.stringify(companyData))
      mostrarPanel()
    } else {
      document.getElementById('login-error').style.display = 'block'
    }
  }

  function mostrarPanel() {
    document.getElementById('login-section').style.display = 'none'
    document.getElementById('panel-section').style.display = 'block'
    document.getElementById('app-header').style.display = 'flex'
    document.getElementById('empresa-nombre').textContent = companyData.name
    document.getElementById('empresa-tipo').textContent = companyData.type
    document.getElementById('header-emoji').textContent = EMOJIS[companyData.type] || '📅'
    document.getElementById('cita-fecha').value = selectedDate
    cargarCitas()
  }

  function logout() {
    localStorage.removeItem('client_token')
    localStorage.removeItem('client_company')
    token = null; companyData = null
    document.getElementById('login-section').style.display = 'flex'
    document.getElementById('panel-section').style.display = 'none'
    document.getElementById('app-header').style.display = 'none'
  }

  async function cargarCitas() {
    const res = await fetch(`${API}/appointments/${companyData.id}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    })
    todasCitas = await res.json()

    const hoy = new Date().toISOString().split('T')[0]
    const finSemana = new Date(); finSemana.setDate(finSemana.getDate() + 7)
    const finMes = new Date(); finMes.setDate(finMes.getDate() + 30)

    const hoyCount = todasCitas.filter(c => new Date(c.date).toISOString().split('T')[0] === hoy && c.status === 'confirmed').length
    const semCount = todasCitas.filter(c => new Date(c.date) >= new Date() && new Date(c.date) <= finSemana && c.status === 'confirmed').length
    const mesCount = todasCitas.filter(c => new Date(c.date) >= new Date() && new Date(c.date) <= finMes && c.status === 'confirmed').length

    document.getElementById('stat-hoy').textContent = hoyCount
    document.getElementById('stat-semana').textContent = semCount
    document.getElementById('stat-mes').textContent = mesCount

    renderCalendario()
    renderUpcoming()
    renderDia(selectedDate)
  }

  function renderCalendario() {
    const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
    const dias = ['Lu','Ma','Mi','Ju','Vi','Sá','Do']
    document.getElementById('cal-titulo').textContent = `${meses[currentMonth.getMonth()]} ${currentMonth.getFullYear()}`

    const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1)
    const lastDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth() + 1, 0)
    const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1
    const today = new Date().toISOString().split('T')[0]

    const fechasConCitas = new Set(todasCitas.filter(c => c.status === 'confirmed').map(c => new Date(c.date).toISOString().split('T')[0]))

    let html = dias.map(d => `<div class="cal-day-name">${d}</div>`).join('')
    for (let i = 0; i < startDay; i++) html += `<div class="cal-day empty"></div>`
    for (let d = 1; d <= lastDay.getDate(); d++) {
      const dateStr = `${currentMonth.getFullYear()}-${String(currentMonth.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
      const isToday = dateStr === today
      const hasCita = fechasConCitas.has(dateStr)
      const isSelected = selectedDate === dateStr
      html += `<div class="cal-day ${isToday?'today':''} ${hasCita?'has-cita':''} ${isSelected&&!isToday?'selected':''}" onclick="selectDate('${dateStr}')">${d}</div>`
    }
    document.getElementById('cal-grid').innerHTML = html
  }

  function renderUpcoming() {
    const ahora = new Date()
    const proximas = todasCitas
      .filter(c => new Date(c.date) >= ahora && c.status === 'confirmed')
      .sort((a,b) => new Date(a.date) - new Date(b.date))
      .slice(0, 8)

    const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']
    const lista = document.getElementById('upcoming-list')

    if (proximas.length === 0) {
      lista.innerHTML = `<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px">No hay citas próximas</div>`
      return
    }

    lista.innerHTML = proximas.map(c => {
      const d = new Date(c.date)
      const dateStr = d.toISOString().split('T')[0]
      return `
        <div class="upcoming-item ${selectedDate === dateStr ? 'selected' : ''}" onclick="selectDate('${dateStr}')">
          <div class="upcoming-dot ${c.status}"></div>
          <div class="upcoming-info">
            <div class="upcoming-name">${c.clientName}</div>
            <div class="upcoming-date">${d.getUTCDate()} ${meses[d.getUTCMonth()]} · ${c.service}</div>
          </div>
          <div class="upcoming-time">${c.time}</div>
        </div>
      `
    }).join('')
  }

  function renderDia(fecha) {
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']
    const diasSemana = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado']
    const d = new Date(fecha + 'T12:00:00')
    const hoy = new Date().toISOString().split('T')[0]

    document.getElementById('dia-titulo').textContent = fecha === hoy ? 'Hoy' : `${diasSemana[d.getDay()].charAt(0).toUpperCase() + diasSemana[d.getDay()].slice(1)}`
    document.getElementById('dia-subtitulo').textContent = `${d.getUTCDate()} de ${meses[d.getUTCMonth()]} de ${d.getUTCFullYear()}`

    const citasDelDia = todasCitas
      .filter(c => new Date(c.date).toISOString().split('T')[0] === fecha)
      .sort((a,b) => a.time.localeCompare(b.time))

    const timeline = document.getElementById('timeline')

    if (citasDelDia.length === 0) {
      timeline.innerHTML = `
        <div class="empty-day">
          <div class="icon">📭</div>
          <h3>Sin citas este día</h3>
          <p>Haz clic en "+ Nueva cita" para agendar</p>
        </div>`
      return
    }

    let html = ''
    HORAS.forEach(hora => {
      const citasHora = citasDelDia.filter(c => c.time === hora)
      if (citasHora.length === 0) return

      html += `<div class="time-block">
        <div class="time-label-col"><span>${hora}</span></div>
        <div class="time-content has-appointment">`

      citasHora.forEach(c => {
        html += `
          <div class="cita-card ${c.status}">
            <div class="cita-card-header">
              <div class="cita-nombre">${c.clientName}</div>
              <div class="cita-hora-badge">${c.time} hrs</div>
            </div>
            <div class="cita-details">
              <div class="cita-detail">💼 <strong>${c.service}</strong></div>
              ${c.clientPhone ? `<div class="cita-detail">📱 ${c.clientPhone}</div>` : ''}
            </div>
            <span class="cita-badge badge-${c.status}">${c.status === 'confirmed' ? '✓ Confirmada' : c.status === 'cancelled' ? '✗ Cancelada' : '✓ Completada'}</span>
            ${c.notes ? `<div class="cita-notes">📝 ${c.notes}</div>` : ''}
          </div>`
      })

      html += `</div></div>`
    })

    timeline.innerHTML = html
  }

  function selectDate(date) {
    selectedDate = date
    renderCalendario()
    renderUpcoming()
    renderDia(date)
  }

  function cambiarMes(dir) {
    currentMonth.setMonth(currentMonth.getMonth() + dir)
    renderCalendario()
  }

  function abrirModal() {
    document.getElementById('cita-fecha').value = selectedDate
    document.getElementById('cita-nombre').value = ''
    document.getElementById('cita-telefono').value = ''
    document.getElementById('cita-servicio').value = ''
    document.getElementById('cita-notas').value = ''
    document.getElementById('modal-cita').classList.add('active')
  }

  function cerrarModal() { document.getElementById('modal-cita').classList.remove('active') }

  async function guardarCita() {
    const clientName = document.getElementById('cita-nombre').value
    const clientPhone = document.getElementById('cita-telefono').value
    const date = document.getElementById('cita-fecha').value
    const time = document.getElementById('cita-hora').value
    const service = document.getElementById('cita-servicio').value
    const notes = document.getElementById('cita-notas').value
    if (!clientName || !date) { alert('Nombre y fecha son obligatorios'); return }
    await fetch(`${API}/appointments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ companyId: companyData.id, clientPhone, clientName, date, time, service, notes })
    })
    cerrarModal()
    cargarCitas()
  }
</script>
</body>
</html>
